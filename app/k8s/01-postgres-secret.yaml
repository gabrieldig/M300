# WICHTIG: Das ist ein Demo-Passwort fürs Lab. Für echten Einsatz
# mit `kubectl create secret` oder einem Secret-Manager ersetzen,
# nicht im Klartext ins Git-Repo committen.
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: taskapp
type: Opaque
stringData:
  POSTGRES_DB: tasksdb
  POSTGRES_USER: tasksuser
  POSTGRES_PASSWORD: changeme
