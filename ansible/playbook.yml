---
# ==========================================
# 1. PLAY: K3s Master installieren
# ==========================================
- name: K3s Master installieren
  hosts: k3s_master
  become: yes
  tasks:
    - name: Systemupdates durchführen
      apt:
        update_cache: yes
        upgrade: dist

    - name: K3s auf Master installieren
      shell: |
        curl -sfL https://get.k3s.io | sh -s - server \
          --cluster-init \
          --disable traefik
      args:
        creates: /usr/local/bin/k3s

    - name: Warten bis K3s API erreichbar ist
      wait_for:
        port: 6443
        delay: 10
        timeout: 120

    - name: K3s Node Token auslesen
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Token als Fact speichern
      set_fact:
        k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"

    - name: Token für Worker zugänglich machen
      copy:
        content: "{{ k3s_node_token }}"
        dest: /tmp/k3s_token
        mode: '0600'

    - name: .kube Verzeichnis erstellen
      file:
        path: /home/ansible/.kube
        state: directory
        owner: ansible
        group: ansible
        mode: '0700'

    - name: Kubeconfig für ansible-User kopieren
      copy:
        src: /etc/rancher/k3s/k3s.yaml
        dest: /home/ansible/.kube/config
        owner: ansible
        group: ansible
        mode: '0600'
        remote_src: yes

    - name: Kubeconfig Server-IP korrigieren
      replace:
        path: /home/ansible/.kube/config
        regexp: 'https://127\.0\.0\.1:6443'
        replace: "https://{{ ansible_host }}:6443"

# ==========================================
# 2. PLAY: K3s Worker Nodes joinen
# ==========================================
- name: K3s Worker Nodes joinen
  hosts: k3s_workers
  become: yes
  tasks:
    - name: Systemupdates durchführen
      apt:
        update_cache: yes
        upgrade: dist

    - name: Master IP aus Inventory lesen
      set_fact:
        k3s_master_ip: "{{ groups['k3s_master'][0] }}"

    - name: K3s Token vom Master holen
      slurp:
        src: /tmp/k3s_token
      delegate_to: "{{ k3s_master_ip }}"
      register: k3s_token_raw

    - name: Token als Fact speichern
      set_fact:
        k3s_node_token: "{{ k3s_token_raw.content | b64decode | trim }}"

    - name: K3s Worker installieren und joinen
      shell: |
        curl -sfL https://get.k3s.io | K3S_URL=https://{{ k3s_master_ip }}:6443 \
          K3S_TOKEN={{ k3s_node_token }} sh -
      args:
        creates: /usr/local/bin/k3s

    - name: Warten bis Worker k3s-Agent läuft
      wait_for:
        port: 10250
        delay: 5
        timeout: 60

    - name: Token-Datei vom Master löschen
      file:
        path: /tmp/k3s_token
        state: absent
      delegate_to: "{{ k3s_master_ip }}"

# ==========================================
# 3. PLAY: Helm & Monitoring (Prometheus/Grafana)
# ==========================================
- name: Helm & Monitoring auf Master installieren
  hosts: k3s_master
  become: yes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Helm installieren
      shell: |
        curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
      args:
        creates: /usr/local/bin/helm

    - name: Prometheus Helm repo hinzufügen
      shell: |
        helm repo add prometheus-community \
          https://prometheus-community.github.io/helm-charts || true
        helm repo update

    - name: Monitoring Namespace erstellen
      shell: kubectl create namespace monitoring --dry-run=client -o yaml | kubectl apply -f -

    - name: kube-prometheus-stack deployen
      shell: |
        helm upgrade --install kube-prometheus-stack \
          prometheus-community/kube-prometheus-stack \
          --namespace monitoring \
          --set grafana.service.type=NodePort \
          --set grafana.service.nodePort=30080 \
          --set grafana.adminPassword=admin123 \
          --set prometheus.service.type=NodePort \
          --set prometheus.service.nodePort=30090 \
          --set alertmanager.enabled=false

# ==========================================
# 4. PLAY: Headlamp Dashboard
# ==========================================
- name: Headlamp Dashboard installieren
  hosts: k3s_master
  become: yes
  environment:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
  tasks:
    - name: Headlamp Helm repo hinzufügen
      shell: |
        helm repo add headlamp https://headlamp-k8s.github.io/headlamp/ || true
        helm repo update

    - name: Headlamp deployen
      shell: |
        helm upgrade --install headlamp headlamp/headlamp \
          --namespace monitoring \
          --set service.type=NodePort \
          --set service.nodePort=30100

    - name: Headlamp ServiceAccount erstellen
      shell: |
        kubectl create serviceaccount headlamp-admin \
          -n monitoring --dry-run=client -o yaml | kubectl apply -f -

    - name: ClusterRoleBinding für Headlamp erstellen
      shell: |
        kubectl create clusterrolebinding headlamp-admin \
          --clusterrole=cluster-admin \
          --serviceaccount=monitoring:headlamp-admin \
          --dry-run=client -o yaml | kubectl apply -f -

    - name: Login-Token generieren
      shell: |
        kubectl create token headlamp-admin \
          -n monitoring --duration=8760h
      register: headlamp_token

    - name: Token anzeigen
      debug:
        msg: "Headlamp Login Token: {{ headlamp_token.stdout }}"

# ==========================================
# 5. PLAY: Task Manager App deployen
# ==========================================
- name: Task Manager App auf K3s deployen
  hosts: k3s_master
  become: yes
  tasks:
    - name: App-Verzeichnis (k8s Manifeste) auf den Master kopieren
      ansible.builtin.copy:
        src: /home/ansible/M300/app/k8s/ # Passe den Pfad zu deinen YAML-Dateien an
        dest: /tmp/taskapp-k8s/
        owner: root
        group: root
        mode: '0755'

    - name: Kubernetes Manifeste anwenden
      ansible.builtin.command: k3s kubectl apply -f /tmp/taskapp-k8s/
      register: deploy_result
      changed_when: "'created' in deploy_result.stdout or 'configured' in deploy_result.stdout"

    - name: Status der Task Manager Pods anzeigen
      ansible.builtin.command: k3s kubectl get pods -n taskapp
      register: pods_status
      changed_when: false

    - name: Pod Status ausgeben
      ansible.builtin.debug:
        var: pods_status.stdout_lines